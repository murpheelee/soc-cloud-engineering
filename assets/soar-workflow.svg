<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="2">SOAR PLAYBOOK COVERAGE</text>

  <!-- Playbook 1: Phishing -->
  <rect x="30" y="50" width="270" height="310" rx="10" fill="#1e1e2e" stroke="#742774" stroke-width="2"/>
  <rect x="30" y="50" width="270" height="40" rx="10" fill="#742774"/>
  <rect x="30" y="78" width="270" height="12" fill="#742774"/>
  <text x="165" y="76" text-anchor="middle" fill="white" font-size="13" font-weight="700">Phishing Triage</text>

  <text x="50" y="115" fill="#c9d1d9" font-size="11">1. Extract IOCs from email</text>
  <circle cx="42" cy="111" r="4" fill="#742774"/>
  <text x="50" y="140" fill="#c9d1d9" font-size="11">2. Enrich via VT, URLhaus</text>
  <circle cx="42" cy="136" r="4" fill="#742774"/>
  <text x="50" y="165" fill="#c9d1d9" font-size="11">3. Auto-score (0-100)</text>
  <circle cx="42" cy="161" r="4" fill="#742774"/>
  <text x="50" y="190" fill="#c9d1d9" font-size="11">4. Block sender domain</text>
  <circle cx="42" cy="186" r="4" fill="#742774"/>
  <text x="50" y="215" fill="#c9d1d9" font-size="11">5. Purge from all inboxes</text>
  <circle cx="42" cy="211" r="4" fill="#742774"/>
  <text x="50" y="240" fill="#c9d1d9" font-size="11">6. Isolate clicker endpoints</text>
  <circle cx="42" cy="236" r="4" fill="#742774"/>
  <text x="50" y="265" fill="#c9d1d9" font-size="11">7. Reset compromised creds</text>
  <circle cx="42" cy="261" r="4" fill="#742774"/>

  <rect x="50" y="285" width="230" height="28" rx="6" fill="#2d1a3d" stroke="#742774" stroke-width="1"/>
  <text x="165" y="304" text-anchor="middle" fill="#c49edd" font-size="10" font-weight="600">FULL AUTO-TRIAGE</text>

  <rect x="50" y="320" width="105" height="22" rx="4" fill="#1a2e1a"/>
  <text x="102" y="335" text-anchor="middle" fill="#00C176" font-size="9" font-weight="600">Score ≥ 50: Block</text>
  <rect x="165" y="320" width="115" height="22" rx="4" fill="#2e2a1a"/>
  <text x="222" y="335" text-anchor="middle" fill="#FF9900" font-size="9" font-weight="600">25-49: Analyst</text>

  <!-- Playbook 2: Credential -->
  <rect x="315" y="50" width="270" height="310" rx="10" fill="#1e1e2e" stroke="#E4002B" stroke-width="2"/>
  <rect x="315" y="50" width="270" height="40" rx="10" fill="#E4002B"/>
  <rect x="315" y="78" width="270" height="12" fill="#E4002B"/>
  <text x="450" y="76" text-anchor="middle" fill="white" font-size="13" font-weight="700">Compromised Credential</text>

  <text x="335" y="115" fill="#c9d1d9" font-size="11">1. Validate alert (VPN check)</text>
  <circle cx="327" cy="111" r="4" fill="#E4002B"/>
  <text x="335" y="140" fill="#c9d1d9" font-size="11">2. Disable account (auto)</text>
  <circle cx="327" cy="136" r="4" fill="#E4002B"/>
  <text x="335" y="165" fill="#c9d1d9" font-size="11">3. Revoke all sessions</text>
  <circle cx="327" cy="161" r="4" fill="#E4002B"/>
  <text x="335" y="190" fill="#c9d1d9" font-size="11">4. Block source IP</text>
  <circle cx="327" cy="186" r="4" fill="#E4002B"/>
  <text x="335" y="215" fill="#c9d1d9" font-size="11">5. Scope: what was accessed?</text>
  <circle cx="327" cy="211" r="4" fill="#E4002B"/>
  <text x="335" y="240" fill="#c9d1d9" font-size="11">6. Reset password + MFA</text>
  <circle cx="327" cy="236" r="4" fill="#E4002B"/>
  <text x="335" y="265" fill="#c9d1d9" font-size="11">7. Monitor 30 days</text>
  <circle cx="327" cy="261" r="4" fill="#E4002B"/>

  <rect x="335" y="285" width="230" height="28" rx="6" fill="#2d1a1a" stroke="#E4002B" stroke-width="1"/>
  <text x="450" y="304" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">SEMI-AUTOMATED</text>

  <rect x="335" y="320" width="105" height="22" rx="4" fill="#2d1a1a"/>
  <text x="387" y="335" text-anchor="middle" fill="#E4002B" font-size="9" font-weight="600">Auto: Disable</text>
  <rect x="450" y="320" width="115" height="22" rx="4" fill="#1a2e1a"/>
  <text x="507" y="335" text-anchor="middle" fill="#00C176" font-size="9" font-weight="600">Analyst: Re-enable</text>

  <!-- Playbook 3: Cloud Exposure -->
  <rect x="600" y="50" width="270" height="310" rx="10" fill="#1e1e2e" stroke="#FF6600" stroke-width="2"/>
  <rect x="600" y="50" width="270" height="40" rx="10" fill="#FF6600"/>
  <rect x="600" y="78" width="270" height="12" fill="#FF6600"/>
  <text x="735" y="76" text-anchor="middle" fill="white" font-size="13" font-weight="700">Cloud Exposure</text>

  <text x="620" y="115" fill="#c9d1d9" font-size="11">1. Identify exposed resource</text>
  <circle cx="612" cy="111" r="4" fill="#FF6600"/>
  <text x="620" y="140" fill="#c9d1d9" font-size="11">2. Restore private ACL (auto)</text>
  <circle cx="612" cy="136" r="4" fill="#FF6600"/>
  <text x="620" y="165" fill="#c9d1d9" font-size="11">3. Re-enable access block</text>
  <circle cx="612" cy="161" r="4" fill="#FF6600"/>
  <text x="620" y="190" fill="#c9d1d9" font-size="11">4. Revoke public SG rules</text>
  <circle cx="612" cy="186" r="4" fill="#FF6600"/>
  <text x="620" y="215" fill="#c9d1d9" font-size="11">5. Verify remediation</text>
  <circle cx="612" cy="211" r="4" fill="#FF6600"/>
  <text x="620" y="240" fill="#c9d1d9" font-size="11">6. Notify resource owner</text>
  <circle cx="612" cy="236" r="4" fill="#FF6600"/>
  <text x="620" y="265" fill="#c9d1d9" font-size="11">7. Create audit ticket</text>
  <circle cx="612" cy="261" r="4" fill="#FF6600"/>

  <rect x="620" y="285" width="230" height="28" rx="6" fill="#2d1f0d" stroke="#FF6600" stroke-width="1"/>
  <text x="735" y="304" text-anchor="middle" fill="#FF9D4D" font-size="10" font-weight="600">FULL AUTO-REMEDIATE</text>

  <rect x="620" y="320" width="230" height="22" rx="4" fill="#1a2e1a"/>
  <text x="735" y="335" text-anchor="middle" fill="#00C176" font-size="9" font-weight="600">No analyst needed — policy violation</text>
</svg>
